<!DOCTYPE html>
<html>
<head>
  <title>Math Tutor AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="home" class="container">
  <h1>Math Tutor AI</h1>

  <button onclick="startLesson()">Mulai Belajar</button>
  <button>Chat AI</button>
  <button>Riwayat</button>
</div>


<div id="lesson" class="container" style="display:none">

  <div class="top">
    <span>Soal 1/10</span>

    <button onclick="openPaper()">📄</button>

    <span>⏱ <span id="timer">00:00</span></span>
  </div>


  <h2>Hitung nilai x:</h2>
  <h1>2x + 5 = 15</h1>


  <h3>Jawaban:</h3>

  <canvas id="answerCanvas"></canvas>


  <button class="next">Selanjutnya</button>

</div>



<div id="paper" class="paper">

  <button class="close" onclick="closePaper()">✕</button>

  <h3>Kertas Coretan</h3>

  <div class="tools">
    <button onclick="pen()">✏️</button>
    <button onclick="eraser()">🧽</button>
  </div>

  <canvas id="canvas"></canvas>

</div>


<script src="script.js"></script>

</body>
</html>
